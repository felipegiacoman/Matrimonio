<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonia & Felipe — 11 de octubre - Matrimonio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; --oscuro: #1a1a1a; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* NAVBAR */
        .navbar { background: rgba(242, 236, 228, 0.95); backdrop-filter: blur(10px); padding: 0.8rem 0; transition: 0.4s; z-index: 1050;}
        .nav-link-custom { color: var(--texto); text-decoration: none; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; margin-right: 20px; font-weight: 500; transition: 0.3s; }
        .nav-link-custom:hover { color: var(--oro); }
        .nav-hidden { transform: translateY(-100%); }

        /* HERO */
        .hero { height: 100vh; background: linear-gradient(rgba(242, 236, 228, 0.1), rgba(242, 236, 228, 0.4)), url('fondo.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-content { background: rgba(255, 255, 255, 0.75); padding: 4rem 2rem; backdrop-filter: blur(8px); max-width: 90%; border: 1px solid rgba(181, 154, 122, 0.2); }
        .hero-names { font-size: clamp(2.5rem, 8vw, 5.5rem); color: var(--oscuro); }
        .hero-date { letter-spacing: 4px; border-top: 1px solid var(--oro); border-bottom: 1px solid var(--oro); padding: 12px 0; margin: 25px 0; display: inline-block; width: 100%; }

        /* SOBRE NOSOTROS */
        .img-nosotros { width: 100%; height: 350px; object-fit: cover; border-radius: 2px; filter: sepia(0.2); transition: 0.5s; }
        .img-nosotros:hover { filter: sepia(0); transform: scale(1.02); }
        #historia-texto { white-space: pre-line; line-height: 1.8; color: #555; text-align: center; }

        /* LOGÍSTICA CON ÍCONOS */
        .card-wedding { background: white; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.02); height: 100%; border-radius: 4px; transition: 0.3s; }
        .icon-container { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin-right: 1.5rem; flex-shrink: 0;}
        .wedding-icon { max-width: 100%; max-height: 100%; object-fit: contain; }
        .event-details { text-align: left; flex-grow: 1;}

        /* BOTONES */
        .btn-gold { background: var(--oro); color: white; border: none; padding: 10px 20px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.65rem; text-decoration: none; display: inline-block; transition: 0.3s; text-align: center;}
        .btn-gold:hover { background: var(--oscuro); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--oro); color: var(--oro); }
        .btn-outline:hover { background: var(--oro); color: white; }
        
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm" id="navbar">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand serif fw-bold" href="#">A <span style="color:var(--oro)">&</span> F</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="#eventos" class="nav-link-custom d-none d-md-block">Ceremonia & Recepción</a>
                <a href="#regalos" class="nav-link-custom d-none d-md-block">Regalos</a>
                <a href="#rsvp" class="btn-gold">Confirmar Asistencia</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content" data-aos="fade-up">
            <p class="text-uppercase small mb-2" style="letter-spacing:4px;">Nos Casamos</p>
            <h1 class="hero-names">Antonia <span class="hero-amp">&</span> Felipe</h1>
            <div class="hero-date" style="margin-bottom: 12px;">DOMINGO 11 DE OCTUBRE, 2026</div>
            <p class="text-uppercase" style="color: #cca471; font-weight: 500; letter-spacing: 2px; font-size: 0.75rem; margin-bottom: 25px;">Lunes 12 — Feriado</p>
            <p class="serif italic mb-0">Santiago, Chile</p>
        </div>
    </header>

    <section class="container py-5 mt-5" id="nosotros">
        <div class="text-center mb-5" data-aos="fade-up">
            <h2 class="display-5 serif">Sobre Nosotros</h2>
            <div style="width:60px; height:1px; background:var(--oro); margin: 20px auto;"></div>
        </div>
        
        <div class="row g-4 mb-5">
            <div class="col-md-4" data-aos="zoom-in"><img src="nosotros1.jpg" class="img-nosotros" alt="Nosotros"></div>
