<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonia & Felipe — Matrimonio 11 de octubre</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; --oscuro: #1a1a1a; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); overflow-x: hidden; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        .navbar { background: rgba(242, 236, 228, 0.95); backdrop-filter: blur(10px); padding: 0.8rem 0; transition: 0.4s; z-index: 1050;}
        .nav-link-custom { color: var(--texto); text-decoration: none; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 1px; margin-right: 20px; font-weight: 500; transition: 0.3s; }
        .nav-link-custom:hover { color: var(--oro); }
        .nav-hidden { transform: translateY(-100%); }

        .hero { height: 100vh; background: linear-gradient(rgba(242, 236, 228, 0.1), rgba(242, 236, 228, 0.4)), url('fondo.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero-content { background: rgba(255, 255, 255, 0.75); padding: 4rem 2rem; backdrop-filter: blur(8px); max-width: 90%; border: 1px solid rgba(181, 154, 122, 0.2); }
        .hero-names { font-size: clamp(2.5rem, 8vw, 5.5rem); color: var(--oscuro); }
        .hero-date { letter-spacing: 4px; border-top: 1px solid var(--oro); border-bottom: 1px solid var(--oro); padding: 12px 0; margin: 25px 0 10px 0; display: inline-block; width: 100%; }
        .feriado-tag { color: var(--oro); font-size: 0.75rem; letter-spacing: 3px; font-weight: 600; text-transform: uppercase; margin-bottom: 20px; }

        .btn-gold { background: var(--oro); color: var(--oscuro); font-weight: bold; border: none; padding: 10px 20px; text-transform: uppercase; letter-spacing: 1px; font-size: 0.65rem; text-decoration: none; display: inline-block; transition: 0.3s; text-align: center; cursor: pointer;}
        .btn-gold:hover { background: var(--oscuro); color: var(--oro); }
        .btn-outline { background: transparent; border: 1px solid var(--oro); color: var(--oro); }
        
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm" id="navbar">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand serif fw-bold" href="#">A <span style="color:var(--oro)">&</span> F</a>
            <div class="collapse navbar-collapse" id="menuNavegacion">
                <div class="navbar-nav ms-auto align-items-center gap-3">
                    <a href="#eventos" class="nav-link-custom">Ceremonia & Recepción</a>
                    <a href="#rsvp" class="btn-gold">Confirmar Asistencia</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content" data-aos="fade-up">
            <h1 class="hero-names">Antonia <span class="hero-amp">&</span> Felipe</h1>
            <div class="hero-date">DOMINGO 11 DE OCTUBRE, 2026</div>
            <p class="feriado-tag">Lunes 12 es feriado</p>
        </div>
    </header>

    <section class="container py-5 text-center" id="rsvp">
        <h2 class="serif h1 mb-4" data-aos="fade-up">Confirmar Asistencia</h2>
        
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-start" data-aos="fade-up">
                <div id="seleccion-modo" class="d-flex flex-column flex-md-row justify-content-center gap-3 mb-4">
                    <button id="btn-solo" class="btn-gold flex-grow-1">Confirmar solo por mí</button>
                    <button id="btn-grupo" class="btn-gold btn-outline flex-grow-1">Confirmar grupo familiar</button>
                </div>

                <div id="contenedor-formulario" style="display: none;">
                    <form id="rsvpForm" class="p-4 border bg-white shadow-sm">
                        <div id="lista-invitados-dinamica"></div>
                        <button type="button" id="btn-agregar-familiar" class="btn-gold btn-outline w-100 mb-4 mt-2" style="display: none;">
                            <i class="bi bi-plus me-1"></i> Ingresar otro miembro familiar
                        </button>
                        <button type="submit" id="btn-enviar-rsvp" class="btn-gold w-100 mt-2 border-0">Enviar Confirmación</button>
                    </form>
                </div>
            </div>
        </div>
        <datalist id="listaInvitadosBD"></datalist>
    </section>

    <a href="https://wa.me/56958194677" class="wa-float" target="_blank"><i class="bi bi-whatsapp"></i></a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const SCRIPT_URL = "https://rsvp-api.felipegiacoman.workers.dev";

        // PRECARGA DE NOMBRES DESDE LA SQL
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                const datalist = document.getElementById('listaInvitadosBD');
                data.forEach(item => {
                    if(item.nombre_invitado) {
                        let opt = document.createElement('option');
                        opt.value = item.nombre_invitado;
                        datalist.appendChild(opt);
                    }
                });
            })
            .catch(err => console.error("Error cargando nombres:", err));

        let contadorInvitados = 0;
        const btnSolo = document.getElementById('btn-solo');
        const btnGrupo = document.getElementById('btn-grupo');
        const contenedorFormulario = document.getElementById('contenedor-formulario');
        const listaDinamica = document.getElementById('lista-invitados-dinamica');
        const btnAgregarFamiliar = document.getElementById('btn-agregar-familiar');

        function crearBloqueInvitado(id) {
            return `
            <div class="bloque-invitado mb-4 pb-4 ${id > 1 ? 'border-top pt-4' : ''}" id="invitado-${id}">
                <div class="mb-3">
                    <label class="form-label small fw-bold" style="color:var(--oro);">NOMBRE COMPLETO</label>
                    <input type="text" class="form-control nombre-buscar" list="listaInvitadosBD" name="nombre" required style="border:1px solid var(--oro);">
                </div>
                <div class="datos-extra" style="display:none;">
                    <div class="row g-3">
                        <div class="col-md-6 mb-3"><label class="form-label small fw-bold">RUT</label><input type="text" class="form-control" name="rut" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label small fw-bold">TELÉFONO</label><input type="tel" class="form-control" name="telefono" value="+569" required></div>
                    </div>
                    <div class="mb-3"><label class="form-label small fw-bold">CORREO</label><input type="email" class="form-control" name="email" required></div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">RESTRICCIÓN ALIMENTARIA</label>
                        <select class="form-select" name="dieta" required>
                            <option value="Ninguna">Ninguna</option>
                            <option value="Vegano">Vegano(a)</option>
                            <option value="Vegetariano">Vegetariano(a)</option>
                            <option value="Celiaco">Celiaco</option>
                        </select>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input check-pareja" type="checkbox" id="cp-${id}">
                        <label class
