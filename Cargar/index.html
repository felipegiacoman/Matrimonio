<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antonia & Felipe — Nuestra Boda</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --oro: #b59a7a; --crema: #f2ece4; --texto: #2d2d2d; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--crema); color: var(--texto); }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('fondo.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .hero-content { background: rgba(255, 255, 255, 0.8); padding: 3rem; backdrop-filter: blur(5px); color: var(--texto); border: 1px solid var(--oro); }
        .img-nosotros { width: 100%; height: 300px; object-fit: cover; margin-bottom: 1rem; }
        .card-wedding { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 1rem; }
        .btn-gold { background: var(--oro); color: white; border: none; padding: 10px 20px; text-decoration: none; display: inline-block; text-transform: uppercase; font-size: 0.8rem; }
        .icon-img { width: 60px; height: 60px; object-fit: contain; margin-right: 15px; }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1 class="display-3">Antonia <span style="color:var(--oro)">&</span> Felipe</h1>
            <p class="lead text-uppercase" style="letter-spacing: 3px;">11 de Octubre, 2026</p>
        </div>
    </header>

    <section class="container py-5">
        <div class="row text-center mb-5">
            <h2 class="serif h1">Nuestra Historia</h2>
            <div id="historia-texto" class="col-md-8 mx-auto mt-3 italic text-muted">Cargando historia...</div>
        </div>
        <div class="row">
            <div class="col-md-4"><img src="nosotros1.jpg" class="img-nosotros"></div>
            <div class="col-md-4"><img src="nosotros2.jpg" class="img-nosotros"></div>
            <div class="col-md-4"><img src="nosotros3.jpg" class="img-nosotros"></div>
        </div>
    </section>

    <section class="container py-5" id="eventos">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card-wedding d-flex align-items-center">
                    <img src="icono_iglesia.png" class="icon-img">
                    <div>
                        <h3 class="h4">Ceremonia Religiosa</h3>
                        <p class="small text-muted">16:30 HRS - San Francisco de Sales</p>
                        <a href="https://ul.waze.com/ul?venue_id=189662650.1896692038.966394&overview=yes" target="_blank" class="btn-gold">Waze</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card-wedding d-flex align-items-center">
                    <img src="icono_evento.png" class="icon-img">
                    <div>
                        <h3 class="h4">Celebración</h3>
                        <p class="small text-muted">18:30 HRS - Entremuros</p>
                        <a href="https://ul.waze.com/ul?venue_id=189597114.1896233287.2665894&overview=yes" target="_blank" class="btn-gold">Waze</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 text-center bg-white mt-5">
        <p class="serif h3">A & F</p>
        <p class="small text-muted">Hecho con ❤️ para nuestra boda</p>
    </footer>

    <script>
        // Carga la historia desde historia.txt
        fetch('historia.txt')
            .then(r => r.text())
            .then(t => document.getElementById('historia-texto').innerText = t)
            .catch(() => document.getElementById('historia-texto').innerText = "Estamos preparando nuestra historia...");
    </script>
</body>
</html>
